name: Atualizar Dashboard

on:
  schedule:
    # Executa a cada 5 minutos (UTC)
    # Para horário de Brasília, ajuste os minutos conforme necessário
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar atualização (horário Brasília)
        run: python update.py
        env:
          # Força o fuso horário de Brasília (UTC-3)
          TZ: 'America/Sao_Paulo'

      - name: Commit alterações
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          # Usa horário de Brasília na mensagem do commit
          git diff --cached --quiet || git commit -m "🔄 Atualização automática - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S') (Horário de Brasília)"

          git push
